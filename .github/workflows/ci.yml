name: CI - 多模态多普勒雷达检测

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Create sample data for testing
      run: |
        mkdir -p test_data
        python -c "
        import numpy as np
        import os
        
        # 创建测试数据
        test_files = [
            '1_1_设备高1.2m风吹绿植7m有人在1m前后踱步.npy',
            '0_2_设备高2m无干扰10m处无人.npy'
        ]
        
        for filename in test_files:
            filepath = os.path.join('test_data', filename)
            fake_data = np.random.randn(3, 64, 25).astype(np.float32)
            np.save(filepath, fake_data)
        
        print('Test data created successfully')
        "
    
    - name: Test imports and basic functionality
      run: |
        python -c "
        import sys
        sys.path.append('src')
        
        # 测试基本导入
        try:
            from utils.text_processor import TextProcessor
            from models.doppler_adapter import DopplerSpectrumAdapter
            from models.doppler_student import DopplerStudent
            print('✓ All imports successful')
        except Exception as e:
            print(f'✗ Import failed: {e}')
            sys.exit(1)
        
        # 测试TextProcessor
        try:
            processor = TextProcessor()
            filename = '1_1_设备高1.2m风吹绿植7m有人在1m前后踱步.npy'
            parsed_info, description = processor.process(filename)
            assert parsed_info.has_person == True
            print('✓ TextProcessor test passed')
        except Exception as e:
            print(f'✗ TextProcessor test failed: {e}')
            sys.exit(1)
        
        # 测试DopplerStudent模型
        try:
            import torch
            model = DopplerStudent(hidden_dim=16, lstm_hidden=8)
            test_input = torch.randn(2, 3, 64, 25)
            outputs = model.forward(test_input)
            assert 'logits' in outputs
            assert outputs['logits'].shape == (2, 2)
            print('✓ DopplerStudent test passed')
        except Exception as e:
            print(f'✗ DopplerStudent test failed: {e}')
            sys.exit(1)
        
        print('All tests passed successfully!')
        "

  style-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: 3.9
    
    - name: Install style checking tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort
    
    - name: Check code formatting with black
      run: |
        black --check --diff src/
    
    - name: Check import sorting with isort
      run: |
        isort --check-only --diff src/

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: 3.9
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run security check with bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Check for known security vulnerabilities
      run: |
        if [ -f requirements.txt ]; then
          safety check -r requirements.txt || true
        fi